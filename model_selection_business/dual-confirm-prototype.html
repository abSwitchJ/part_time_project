    kids.push(e('div', { key: 'bt', style: { padding: '4px 22px 8px' } },
      e('button', { onClick: function () { setShowBk(!showBk); }, style: { all: 'unset', cursor: 'pointer', fontFamily: M, fontSize: 9.5, letterSpacing: 1.2, textTransform: 'uppercase', color: t.coffee } },
        (showBk ? '▾ ' : '▸ ') + '备选池 · RANK 3–4 · 递补按此顺序自动激活')));
    if (showBk) kids.push(e('div', { key: 'bk', style: { padding: '0 22px' } },
      bk.map(function (x) { return e(Card, { key: x.rank, c: x, removable: false, backup: true }); })));

    if (status === 'pending') {
      kids.push(e('div', { key: 'ops', style: { padding: '10px 22px 30px' } },
        e('button', { onClick: function () { setStatus('confirmed'); },
          style: { all: 'unset', cursor: 'pointer', display: 'block', textAlign: 'center', width: '100%', boxSizing: 'border-box', padding: '15px 0', background: t.coffee, color: '#f5ecd9', fontFamily: D, fontStyle: 'italic', fontSize: 19, boxShadow: '0 6px 16px -8px rgba(120,60,20,0.4)', marginBottom: 12 } }, '全 部 确 认   →'),

          style: { all: 'unset', cursor: 'pointer', display: 'block', textAlign: 'center', width: '100%', boxSizing: 'border-box', padding: '12px 0', border: '0.5px solid ' + t.stamp, color: t.stamp, fontFamily: M, fontSize: 11, letterSpacing: 2, textTransform: 'uppercase' } }, '退回重选 + 异议原因')));
    }

    return e('div', { style: { background: t.bg, color: t.fg, minHeight: '100%', fontFamily: SS, backgroundImage: 'radial-gradient(circle at 20% 10%, rgba(122,74,40,0.10), transparent 50%)', paddingBottom: 40 } }, kids);
  }
  Object.assign(window, { EmployerRoster: EmployerRoster });
})();
