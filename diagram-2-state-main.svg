<svg width="1000" height="900" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#374151"/>
    </marker>
    <marker id="arrdash" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
    <marker id="arrred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrorng" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- ===== Initial state ===== -->
  <circle cx="240" cy="60" r="7" fill="#1f2937"/>

  <!-- ===== States ===== -->
  <!-- 草稿 -->
  <rect x="190" y="90" width="100" height="40" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="240" y="115" text-anchor="middle" font-size="13" font-weight="500">草稿</text>

  <!-- 审核中 -->
  <rect x="190" y="175" width="100" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="240" y="200" text-anchor="middle" font-size="13" font-weight="500">审核中</text>

  <!-- 驳回待修改 -->
  <rect x="410" y="175" width="120" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="470" y="200" text-anchor="middle" font-size="13" font-weight="500">驳回待修改</text>

  <!-- 已发布 -->
  <rect x="190" y="265" width="100" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="240" y="290" text-anchor="middle" font-size="13" font-weight="500">已发布</text>

  <!-- 已过期 (final) -->
  <rect x="650" y="265" width="100" height="40" rx="6" fill="#e5e7eb" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="653" y="268" width="94" height="34" rx="4" fill="none" stroke="#4b5563" stroke-width="1"/>
  <text x="700" y="290" text-anchor="middle" font-size="13" font-weight="500" fill="#1f2937">已过期</text>

  <!-- 筛选中 -->
  <rect x="190" y="355" width="100" height="40" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="240" y="380" text-anchor="middle" font-size="13" font-weight="500">筛选中</text>

  <!-- 待招聘方确认 ★ -->
  <rect x="170" y="445" width="140" height="40" rx="6" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="240" y="470" text-anchor="middle" font-size="13" font-weight="600" fill="#7c2d12">★ 待招聘方确认</text>

  <!-- 异议重筛 -->
  <rect x="410" y="445" width="120" height="40" rx="6" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
  <text x="470" y="470" text-anchor="middle" font-size="13" font-weight="500">异议重筛</text>

  <!-- 已取消 (final) -->
  <rect x="650" y="445" width="100" height="40" rx="6" fill="#e5e7eb" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="653" y="448" width="94" height="34" rx="4" fill="none" stroke="#4b5563" stroke-width="1"/>
  <text x="700" y="470" text-anchor="middle" font-size="13" font-weight="500" fill="#1f2937">已取消</text>

  <!-- 待应聘方确认 ★ NEW -->
  <rect x="170" y="535" width="140" height="40" rx="6" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="240" y="560" text-anchor="middle" font-size="13" font-weight="600" fill="#7c2d12">★ 待应聘方确认</text>

  <!-- 递补中 (moved up to same row as 待应聘方确认) -->
  <rect x="410" y="535" width="120" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="470" y="560" text-anchor="middle" font-size="13" font-weight="500">递补中</text>

  <!-- 已成单 -->
  <rect x="190" y="625" width="100" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="240" y="650" text-anchor="middle" font-size="13" font-weight="500">已成单</text>

  <!-- 已关闭 (final) -->
  <rect x="190" y="735" width="100" height="40" rx="6" fill="#bbf7d0" stroke="#047857" stroke-width="1.5"/>
  <rect x="193" y="738" width="94" height="34" rx="4" fill="none" stroke="#047857" stroke-width="1"/>
  <text x="240" y="760" text-anchor="middle" font-size="13" font-weight="600" fill="#064e3b">已关闭</text>

  <!-- ===== Main path arrows (vertical, solid) ===== -->
  <g font-size="11" fill="#374151">
    <!-- ● → 草稿 -->
    <line x1="240" y1="67" x2="240" y2="88" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 草稿 → 审核中 -->
    <line x1="240" y1="130" x2="240" y2="173" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="248" y="156">提交审核 (#9)</text>

    <!-- 审核中 → 已发布 -->
    <line x1="240" y1="215" x2="240" y2="263" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="248" y="243">审核通过</text>

    <!-- 已发布 → 筛选中 -->
    <line x1="240" y1="305" x2="240" y2="353" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="248" y="333">有人报名 (#14)</text>

    <!-- 筛选中 → 待招聘方确认 -->
    <line x1="240" y1="395" x2="240" y2="443" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="248" y="415">中介方提交 (#17)</text>
    <text x="248" y="430" fill="#6b7280" font-style="italic" font-size="10">或 T1 24h超时自动初筛</text>

    <!-- 待招聘方确认 → 待应聘方确认 ★ NEW v3 -->
    <line x1="240" y1="485" x2="240" y2="533" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="248" y="505" font-weight="600" fill="#7c2d12">招聘方确认名单 ★</text>
    <text x="248" y="520" fill="#6b7280" font-style="italic" font-size="10">(#18 推送名单)</text>

    <!-- 待应聘方确认 → 已成单 ★ NEW v3 -->
    <line x1="240" y1="575" x2="240" y2="623" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="248" y="595" font-weight="600" fill="#7c2d12">应聘方确认 ★</text>
    <text x="248" y="610" fill="#6b7280" font-style="italic" font-size="10">(#19 → 拉群 #20-22)</text>

    <!-- 已成单 → 已关闭 -->
    <line x1="240" y1="665" x2="240" y2="733" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="248" y="703">兼职完成确认</text>
  </g>

  <!-- ===== Right branches (alt paths) ===== -->
  <g font-size="11" fill="#374151">
    <!-- 审核中 → 驳回待修改 -->
    <line x1="290" y1="195" x2="408" y2="195" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="349" y="189" text-anchor="middle">审核驳回 [alt 1]</text>

    <!-- 驳回待修改 → 审核中 (curve back) -->
    <path d="M 410 215 Q 350 248 292 215" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="349" y="252" text-anchor="middle">修改后重新提交</text>

    <!-- 待招聘方确认 → 异议重筛 (含 T2 超时, NEW v3) -->
    <line x1="310" y1="465" x2="408" y2="465" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="359" y="459" text-anchor="middle">退回 [alt 3] / T2 超时</text>

    <!-- 异议重筛 → 待招聘方确认 (curve back below) -->
    <path d="M 410 485 Q 360 518 312 485" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="361" y="522" text-anchor="middle">中介方重新提交</text>

    <!-- 待应聘方确认 → 递补中 (NEW v3, replaces v2's 已成单→递补中) -->
    <line x1="310" y1="555" x2="408" y2="555" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="360" y="549" text-anchor="middle">应聘方放弃/超时 [alt 4]</text>

    <!-- 递补中 → 待应聘方确认 (CHANGED v3: 直接激活下一备选, 不再回招聘方确认) -->
    <path d="M 410 575 Q 360 605 312 575" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrorng)"/>
    <text x="360" y="612" text-anchor="middle" fill="#9a3412" font-weight="500">激活下一备选</text>

    <!-- 递补中 → 筛选中 (备选池耗尽, 回流) -->
    <path d="M 530 555 C 620 555 620 380 292 380" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrorng)"/>
    <text x="450" y="372" text-anchor="middle" fill="#9a3412" font-weight="500">备选池耗尽 → 重新筛选</text>
  </g>

  <!-- ===== Exception terminations (dashed gray) ===== -->
  <g font-size="11">
    <!-- 已发布 → 已过期 -->
    <line x1="290" y1="285" x2="648" y2="285" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrdash)"/>
    <text x="470" y="279" text-anchor="middle" fill="#6b7280">距截止24h策略后仍无人报名</text>
  </g>

  <!-- ===== Active cancellation (dashed red) ===== -->
  <g font-size="11">
    <!-- 待招聘方确认 → 已取消 (representative, curves high above 异议重筛 + T2 label) -->
    <path d="M 310 450 C 380 385 600 385 650 455" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrred)"/>
    <text x="490" y="385" text-anchor="middle" fill="#dc2626" font-weight="500">招聘方主动取消 (代表)</text>

    <!-- 驳回待修改 → 已取消 (NEW v3) -->
    <path d="M 530 200 Q 690 295 700 445" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrred)"/>
    <text x="660" y="265" text-anchor="middle" fill="#dc2626" font-weight="500">招聘方放弃 (NEW)</text>
  </g>

  <!-- ===== Right-side annotations ===== -->
  <!-- ★ 双重确认闭环 -->
  <g>
    <rect x="780" y="420" width="200" height="76" fill="#ffedd5" stroke="#ea580c" stroke-width="1" rx="4"/>
    <text x="790" y="437" font-size="11" fill="#7c2d12" font-weight="600">★ 双重确认闭环 (v3 新增)</text>
    <text x="790" y="454" font-size="10.5" fill="#7c2d12">招聘方确认 (#18) → 应聘方确认 (#19)</text>
    <text x="790" y="468" font-size="10.5" fill="#7c2d12">两段串联,任一阶段中断均</text>
    <text x="790" y="482" font-size="10.5" fill="#7c2d12">触发异议重筛/递补流程</text>
  </g>

  <!-- ⚠ 取消范围 + MVP note -->
  <g>
    <rect x="780" y="540" width="200" height="160" fill="#fef9c3" stroke="#ca8a04" stroke-width="1" rx="4"/>
    <text x="790" y="557" font-size="11" fill="#713f12" font-weight="600">⚠ 取消可发生于多个状态</text>
    <text x="790" y="574" font-size="10.5" fill="#713f12">来源状态(均允许招聘方取消):</text>
    <text x="790" y="589" font-size="10.5" fill="#713f12">• 驳回待修改 (v3 新增)</text>
    <text x="790" y="603" font-size="10.5" fill="#713f12">• 已发布 / 筛选中</text>
    <text x="790" y="617" font-size="10.5" fill="#713f12">• 待招聘方确认 / 待应聘方确认</text>
    <text x="790" y="631" font-size="10.5" fill="#713f12">• 已成单 / 递补中</text>
    <text x="790" y="652" font-size="10.5" fill="#713f12" font-weight="600">MVP: 不分级,直接 → 已取消</text>
    <text x="790" y="666" font-size="10.5" fill="#713f12">+ 通知所有相关方</text>
    <text x="790" y="680" font-size="10.5" fill="#713f12">+ 取消该单全部待办任务</text>
    <text x="790" y="694" font-size="10.5" fill="#713f12" font-style="italic">v2 引入按状态分级的补偿策略</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(40, 820)" font-size="11">
    <circle cx="8" cy="8" r="6" fill="#1f2937"/>
    <text x="22" y="12" fill="#4b5563">初始状态</text>

    <g transform="translate(110, 0)">
      <rect width="40" height="16" rx="3" fill="#bbf7d0" stroke="#047857" stroke-width="1"/>
      <rect x="2" y="2" width="36" height="12" rx="2" fill="none" stroke="#047857" stroke-width="0.8"/>
      <text x="48" y="12" fill="#4b5563">终态 (Final)</text>
    </g>

    <g transform="translate(225, 0)">
      <line x1="0" y1="8" x2="40" y2="8" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="48" y="12" fill="#4b5563">正常迁移</text>
    </g>

    <g transform="translate(335, 0)">
      <line x1="0" y1="8" x2="40" y2="8" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrdash)"/>
      <text x="48" y="12" fill="#4b5563">异常终结</text>
    </g>

    <g transform="translate(440, 0)">
      <line x1="0" y1="8" x2="40" y2="8" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrred)"/>
      <text x="48" y="12" fill="#4b5563">主动取消</text>
    </g>

    <g transform="translate(550, 0)">
      <line x1="0" y1="8" x2="40" y2="8" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrorng)"/>
      <text x="48" y="12" fill="#4b5563">回流/递补</text>
    </g>

    <g transform="translate(660, 0)">
      <rect width="20" height="16" rx="3" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
      <text x="28" y="12" fill="#4b5563">★ 闭环关键状态</text>
    </g>
  </g>
</svg>
