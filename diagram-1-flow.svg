<svg width="940" height="830" viewBox="0 0 940 830" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#374151"/>
    </marker>
    <marker id="arrd" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="arro" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#c2410c"/>
    </marker>
  </defs>

  <!-- Participants -->
  <g font-family="inherit" font-size="13">
    <rect x="70"  y="20" width="120" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="130" y="42" text-anchor="middle" font-weight="600">应聘方</text>
    <rect x="310" y="20" width="120" height="36" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="370" y="42" text-anchor="middle" font-weight="600">兼职小程序</text>
    <rect x="550" y="20" width="120" height="36" rx="6" fill="#d1fae5" stroke="#059669"/>
    <text x="610" y="42" text-anchor="middle" font-weight="600">招聘方</text>
    <rect x="770" y="20" width="120" height="36" rx="6" fill="#fed7aa" stroke="#ea580c"/>
    <text x="830" y="42" text-anchor="middle" font-weight="600">中介方</text>
  </g>

  <!-- Pre-condition note -->
  <g>
    <rect x="755" y="66" width="150" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="4,2"/>
    <text x="830" y="82" text-anchor="middle" font-size="11" fill="#92400e">前置:中介方为</text>
    <text x="830" y="98" text-anchor="middle" font-size="11" fill="#92400e">平台预先入驻方</text>
  </g>

  <!-- Lifelines -->
  <g stroke="#9ca3af" stroke-dasharray="3,3" stroke-width="1">
    <line x1="130" y1="56"  x2="130" y2="775"/>
    <line x1="370" y1="56"  x2="370" y2="775"/>
    <line x1="610" y1="56"  x2="610" y2="775"/>
    <line x1="830" y1="106" x2="830" y2="775"/>
  </g>

  <!-- 小程序 activation (central hub, near-continuous) -->
  <g fill="#e0e7ff" stroke="#7c3aed" stroke-width="0.8">
    <rect x="366" y="132" width="8" height="250"/>
    <rect x="366" y="398" width="8" height="180"/>
    <rect x="366" y="590" width="8" height="165"/>
  </g>

  <!-- 应聘方 activations -->
  <g fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8">
    <rect x="126" y="133" width="8" height="38"/>
    <rect x="126" y="238" width="8" height="38"/>
    <rect x="126" y="400" width="8" height="20"/>
    <rect x="126" y="458" width="8" height="62"/>
    <rect x="126" y="618" width="8" height="80"/>
  </g>

  <!-- 招聘方 activations -->
  <g fill="#d1fae5" stroke="#059669" stroke-width="0.8">
    <rect x="606" y="186" width="8" height="38"/>
    <rect x="606" y="290" width="8" height="38"/>
    <rect x="606" y="343" width="8" height="38"/>
    <rect x="606" y="588" width="8" height="22"/>
    <rect x="606" y="710" width="8" height="18"/>
  </g>

  <!-- 中介方 activations -->
  <g fill="#fed7aa" stroke="#ea580c" stroke-width="0.8">
    <rect x="826" y="429" width="8" height="18"/>
    <rect x="826" y="532" width="8" height="48"/>
    <rect x="826" y="738" width="8" height="18"/>
  </g>

  <!-- Messages -->
  <g font-family="inherit" font-size="12">
    <!-- 1 -->
    <line x1="135" y1="140" x2="365" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="250" y="135" text-anchor="middle">1: 打开, 注册登录</text>
    <!-- 2 -->
    <line x1="365" y1="163" x2="135" y2="163" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
    <text x="250" y="158" text-anchor="middle" fill="#4b5563">2: 登录成功</text>
    <!-- 3 -->
    <line x1="605" y1="193" x2="375" y2="193" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="490" y="188" text-anchor="middle">3: 打开, 注册登录</text>
    <!-- 4 -->
    <line x1="375" y1="216" x2="605" y2="216" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
    <text x="490" y="211" text-anchor="middle" fill="#4b5563">4: 登录成功</text>
    <!-- 5 -->
    <line x1="135" y1="245" x2="365" y2="245" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="250" y="240" text-anchor="middle">5: 填资料 + 期望类别/时段</text>
    <!-- 6 -->
    <line x1="365" y1="268" x2="135" y2="268" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
    <text x="250" y="263" text-anchor="middle" fill="#4b5563">6: 保存成功</text>
    <!-- 7 -->
    <line x1="605" y1="297" x2="375" y2="297" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="490" y="292" text-anchor="middle">7: 填写基本信息</text>
    <!-- 8 -->
    <line x1="375" y1="320" x2="605" y2="320" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
    <text x="490" y="315" text-anchor="middle" fill="#4b5563">8: 保存成功</text>
    <!-- 9 -->
    <line x1="605" y1="350" x2="375" y2="350" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="490" y="345" text-anchor="middle">9: 发布招募令 (选类别)</text>
    <!-- 10 -->
    <line x1="375" y1="373" x2="605" y2="373" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
    <text x="490" y="368" text-anchor="middle" fill="#4b5563">10: 发布成功</text>
    <!-- 11 (async push, dashed) -->
    <line x1="365" y1="408" x2="135" y2="408" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
    <text x="250" y="403" text-anchor="middle" fill="#4b5563">11: 推送匹配兼职</text>
    <!-- 12 (async push, dashed) -->
    <line x1="375" y1="437" x2="825" y2="437" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
    <text x="600" y="432" text-anchor="middle" fill="#4b5563">12: 推送新招聘信息</text>
    <!-- 13 -->
    <line x1="135" y1="465" x2="365" y2="465" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="250" y="460" text-anchor="middle">13: 查看招募令</text>
    <!-- 14 -->
    <line x1="135" y1="490" x2="365" y2="490" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="250" y="485" text-anchor="middle">14: 报名意向兼职</text>
    <!-- 15 -->
    <line x1="365" y1="515" x2="135" y2="515" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
    <text x="250" y="510" text-anchor="middle" fill="#4b5563">15: 报名成功</text>
    <!-- 16 -->
    <line x1="825" y1="540" x2="375" y2="540" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="600" y="535" text-anchor="middle">16: 查看报名人员</text>
    <!-- 17 -->
    <line x1="825" y1="572" x2="375" y2="572" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="600" y="567" text-anchor="middle">17: 提交筛选结果</text>
    <!-- 18 ★ -->
    <line x1="375" y1="600" x2="605" y2="600" stroke="#c2410c" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arro)"/>
    <text x="490" y="595" text-anchor="middle" fill="#c2410c" font-weight="600">★ 18: 通知入选名单 (闭环新增)</text>
    <!-- 19 -->
    <line x1="365" y1="628" x2="135" y2="628" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
    <text x="250" y="623" text-anchor="middle" fill="#4b5563">19: 通知入选</text>
    <!-- 19a ★ NEW v3 (应聘方显式确认接受) -->
    <line x1="135" y1="650" x2="365" y2="650" stroke="#c2410c" stroke-width="1.8" marker-end="url(#arro)"/>
    <text x="250" y="645" text-anchor="middle" fill="#c2410c" font-weight="600">★ 19a: 应聘方确认接受 (T3 24h 应答窗口)</text>
    <!-- 20 unified label -->
    <line x1="365" y1="690" x2="135" y2="690" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="250" y="685" text-anchor="middle">20: 拉入沟通群聊</text>
    <!-- 21 -->
    <line x1="375" y1="718" x2="605" y2="718" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="490" y="713" text-anchor="middle">21: 拉入沟通群聊</text>
    <!-- 22 -->
    <line x1="375" y1="746" x2="825" y2="746" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="600" y="741" text-anchor="middle">22: 拉入沟通群聊</text>
  </g>

  <!-- Legend -->
  <g font-family="inherit" font-size="11" transform="translate(50, 798)">
    <line x1="0"   y1="6" x2="38"  y2="6" stroke="#374151" stroke-width="1.5"/>
    <text x="46"  y="10" fill="#4b5563">同步调用</text>
    <line x1="125" y1="6" x2="163" y2="6" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3"/>
    <text x="171" y="10" fill="#4b5563">异步通知 / 返回</text>
    <text x="290" y="10" fill="#c2410c" font-weight="600">★</text>
    <text x="304" y="10" fill="#4b5563">关键闭环 (本版新增/优化)</text>
    <rect x="490" y="1" width="10" height="10" fill="#e0e7ff" stroke="#7c3aed" stroke-width="0.8"/>
    <text x="506" y="10" fill="#4b5563">激活条 Execution Spec</text>
  </g>
</svg>
