<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#374151"/>
    </marker>
    <marker id="arr2orng" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <marker id="arr2red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Initial states (left) -->
  <rect x="60" y="80" width="120" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="105" text-anchor="middle" font-size="12" font-weight="500">SELECTED 入选</text>
  <text x="120" y="65" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">rank ≤ N</text>

  <rect x="60" y="200" width="120" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="120" y="225" text-anchor="middle" font-size="12" font-weight="500">BACKUP 备选</text>
  <text x="120" y="260" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">rank &gt; N,按序待激活</text>

  <!-- Middle: PENDING -->
  <rect x="370" y="140" width="120" height="40" rx="6" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="430" y="165" text-anchor="middle" font-size="12" font-weight="600" fill="#7c2d12">PENDING 应答中</text>
  <text x="430" y="195" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">T3 24h应答窗口</text>

  <!-- Terminal states (right) -->
  <rect x="680" y="40" width="140" height="40" rx="6" fill="#bbf7d0" stroke="#047857" stroke-width="1.5"/>
  <rect x="683" y="43" width="134" height="34" rx="4" fill="none" stroke="#047857" stroke-width="1"/>
  <text x="750" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#064e3b">CONFIRMED 已确认</text>

  <rect x="680" y="130" width="140" height="40" rx="6" fill="#e5e7eb" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="683" y="133" width="134" height="34" rx="4" fill="none" stroke="#4b5563" stroke-width="1"/>
  <text x="750" y="155" text-anchor="middle" font-size="12" font-weight="500">DECLINED 已放弃</text>

  <rect x="680" y="200" width="140" height="40" rx="6" fill="#e5e7eb" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="683" y="203" width="134" height="34" rx="4" fill="none" stroke="#4b5563" stroke-width="1"/>
  <text x="750" y="225" text-anchor="middle" font-size="12" font-weight="500">ABORTED 单已取消</text>

  <rect x="680" y="270" width="140" height="40" rx="6" fill="#e5e7eb" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="683" y="273" width="134" height="34" rx="4" fill="none" stroke="#4b5563" stroke-width="1"/>
  <text x="750" y="295" text-anchor="middle" font-size="12" font-weight="500">SKIPPED 未被激活</text>

  <!-- Arrows -->
  <g font-size="11" fill="#374151">
    <!-- SELECTED → PENDING -->
    <line x1="180" y1="100" x2="368" y2="150" stroke="#374151" stroke-width="1.5" marker-end="url(#arr2)"/>
    <text x="270" y="115" text-anchor="middle">招聘方确认名单</text>

    <!-- BACKUP → PENDING (orange, recovery) -->
    <line x1="180" y1="220" x2="368" y2="170" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr2orng)"/>
    <text x="270" y="200" text-anchor="middle" fill="#9a3412" font-weight="500">被激活递补</text>

    <!-- PENDING → CONFIRMED -->
    <line x1="490" y1="150" x2="678" y2="65" stroke="#374151" stroke-width="1.5" marker-end="url(#arr2)"/>
    <text x="580" y="105" text-anchor="middle">应聘方接受</text>

    <!-- PENDING → DECLINED -->
    <line x1="490" y1="160" x2="678" y2="150" stroke="#374151" stroke-width="1.5" marker-end="url(#arr2)"/>
    <text x="585" y="142" text-anchor="middle">放弃 / T3 超时</text>
    <text x="585" y="158" text-anchor="middle" fill="#9a3412" font-size="10" font-style="italic">→ 触发递补</text>

    <!-- PENDING → ABORTED (red dashed) -->
    <line x1="490" y1="175" x2="678" y2="220" stroke="#dc2626" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr2red)"/>
    <text x="585" y="200" text-anchor="middle" fill="#dc2626">招募令取消</text>

    <!-- BACKUP → SKIPPED -->
    <line x1="180" y1="225" x2="678" y2="285" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
    <text x="430" y="280" text-anchor="middle" fill="#6b7280">招募令完成/取消时未被激活</text>
  </g>

  <!-- Note -->
  <g>
    <rect x="50" y="320" width="800" height="32" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" rx="4"/>
    <text x="60" y="340" font-size="11" fill="#1e3a8a">
      <tspan font-weight="600">招募令层面的"待应聘方确认"</tspan> = 存在至少一个 PENDING 候选人;
      所有候选人均 CONFIRMED / DECLINED / SKIPPED 后,触发整单结算迁移。
    </text>
  </g>
</svg>
